services:
  - type: web
    name: gestion-factures-backend
    runtime: node
    repo: https://github.com/AosaCorp/gestion-factures-backend.git # À adapter
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        sync: false # sera défini dans l'interface Render
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1